<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions Demonstration</title>
</head>
<body>

<h2>JavaScript Function Concepts</h2>
<button onclick="execute()">Click to Execute</button>
<p id="result"></p>

<script>

// 1. Normal Function
function add(a, b) {
    return a + b;
}

// 2. Function Expression
var multiply = function(x, y) {
    return x * y;
};

// 3. Arrow Function
const square = (num) => num * num;

// 4. Default Parameter Function
function greet(name = "Student") {
    return "Hello, " + name;
}

// 5. Callback Function
function calculator(a, b, operation) {
    return operation(a, b);
}

// Main Function
function execute() {

    let sum = add(10, 20);
    let product = multiply(5, 4);
    let sq = square(6);
    let message = greet("Ammupriya");

    let result = calculator(8, 2, add);

    // Built-in Functions
    let randomNum = Math.random();
    let maxNum = Math.max(10, 25, 40);
    let rounded = Math.round(4.7);

    let text = "Full Stack Development";
    let length = text.length;
    let upper = text.toUpperCase();
    let lower = text.toLowerCase();

    document.getElementById("result").innerHTML =
        "Addition: " + sum + "<br>" +
        "Multiplication: " + product + "<br>" +
        "Square: " + sq + "<br>" +
        message + "<br>" +
        "Callback Result: " + result + "<br><br>" +
        "Random Number: " + randomNum + "<br>" +
        "Maximum Number: " + maxNum + "<br>" +
        "Rounded Value: " + rounded + "<br>" +
        "String Length: " + length + "<br>" +
        "Uppercase: " + upper + "<br>" +
        "Lowercase: " + lower;
}

</script>

</body>
</html>
